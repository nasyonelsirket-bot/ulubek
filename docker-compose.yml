services:
  postgres:
    image: postgres:16-alpine
    container_name: ulubek-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ulubek
      POSTGRES_PASSWORD: ulubek_secret
      POSTGRES_DB: ulubekmedya
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ulubek -d ulubekmedya"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
